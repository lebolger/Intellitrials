<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clinical Dashboard Mobile-Optimized</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    
    <style>
        /* Mobile-First CSS optimizations */
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .chart-container { position: relative; height: 250px; width: 100%; will-change: transform; }
        
        /* Hardware acceleration for smoother mobile scrolling */
        .scroll-container { 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; 
            backface-visibility: hidden;
        }

        /* Skeleton loader for perceived performance */
        .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Optimize table for small screens */
        @media (max-width: 640px) {
            .mobile-hide { display: none; }
            .chart-container { height: 200px; }
            th, td { padding: 0.5rem !important; font-size: 0.7rem !important; }
        }
    </style>
</head>
<body class="text-slate-200">

    <div class="max-w-screen-xl mx-auto p-3">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-lg font-bold text-white leading-tight">Clinical Trials <span class="text-blue-400">Pro</span></h1>
            <div id="connectionStatus" class="h-2 w-2 rounded-full bg-green-500"></div>
        </header>

        <div class="flex overflow-x-auto gap-3 pb-4 mb-2 scroll-container">
            <div class="min-w-[140px] bg-slate-800 p-3 rounded-xl border border-slate-700">
                <p class="text-slate-400 text-xs">Total Trials</p>
                <p id="totalTrials" class="text-xl font-bold">...</p>
            </div>
            <div class="min-w-[140px] bg-slate-800 p-3 rounded-xl border border-slate-700">
                <p class="text-slate-400 text-xs">Recruiting</p>
                <p id="recruitingTrials" class="text-xl font-bold text-green-400">...</p>
            </div>
            <div class="min-w-[140px] bg-slate-800 p-3 rounded-xl border border-slate-700">
                <p class="text-slate-400 text-xs">Enrollment</p>
                <p id="totalParticipants" class="text-xl font-bold text-blue-400">...</p>
            </div>
        </div>

        <details class="bg-slate-800 rounded-xl mb-4 border border-slate-700 overflow-hidden">
            <summary class="p-3 text-sm font-semibold cursor-pointer list-none flex justify-between items-center">
                <span>Filter & Search</span>
                <span class="text-blue-400 text-xs">Adjust</span>
            </summary>
            <div class="p-3 grid grid-cols-1 gap-3 border-t border-slate-700">
                <input type="text" id="keywordSearch" class="bg-slate-900 border-slate-700 rounded-lg text-sm w-full" placeholder="Keyword...">
                <div class="grid grid-cols-2 gap-2">
                    <select id="statusFilter" class="bg-slate-900 border-slate-700 rounded-lg text-sm"></select>
                    <select id="phaseFilter" class="bg-slate-900 border-slate-700 rounded-lg text-sm"></select>
                </div>
            </div>
        </details>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-800 p-3 rounded-xl border border-slate-700">
                <h3 class="text-xs font-bold mb-2 text-slate-400 uppercase tracking-wider">Phase Distribution</h3>
                <div class="chart-container"><canvas id="phaseChart"></canvas></div>
            </div>
            <div class="bg-slate-800 p-3 rounded-xl border border-slate-700">
                <h3 class="text-xs font-bold mb-2 text-slate-400 uppercase tracking-wider">Top Sponsors</h3>
                <div class="chart-container"><canvas id="sponsorChart"></canvas></div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
            <div class="p-3 border-b border-slate-700 flex justify-between items-center">
                <h3 class="text-sm font-bold text-white">Trial Registry</h3>
                <span id="recordCount" class="text-[10px] bg-slate-900 px-2 py-1 rounded text-slate-400">Loading...</span>
            </div>
            <div class="overflow-x-auto scroll-container">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-900/50 text-[10px] uppercase text-slate-500">
                        <tr>
                            <th class="p-3">NCT / Title</th>
                            <th class="p-3 text-center">Status</th>
                            <th class="p-3 text-right mobile-hide">Started</th>
                        </tr>
                    </thead>
                    <tbody id="trialsTableBody" class="text-xs">
                        </tbody>
                </table>
            </div>
            <button id="loadMore" class="w-full py-3 bg-slate-700/50 text-blue-400 text-sm font-medium hover:bg-slate-700">Load More Results</button>
        </div>
    </div>

    <script>
        // --- PERFORMANCE CONFIG ---
        const CONFIG = {
            CHUNK_SIZE: 15, // Only render 15 rows at a time for mobile RAM
            DEBOUNCE_MS: 400
        };

        let allTrials = [];
        let filteredTrials = [];
        let displayedCount = 0;
        let charts = {};

        // --- WEB WORKER IN-LINE ---
        // (Keeping your worker logic but adding more efficient filtering)
        const workerCode = `
            self.onmessage = async (e) => {
                if (e.data.type === 'FETCH') {
                    try {
                        const response = await fetch('https://clinicaltrials.gov/api/v2/studies?pageSize=1000&query.term=AREA[OrgClass]INDUSTRY+AND+AREA[StudyType]INTERVENTIONAL');
                        const data = await response.json();
                        const processed = data.studies.map(s => ({
                            nct: s.protocolSection.identificationModule.nctId,
                            title: s.protocolSection.identificationModule.officialTitle,
                            status: s.protocolSection.statusModule.overallStatus,
                            phase: s.protocolSection.designModule?.phases?.[0] || 'N/A',
                            sponsor: s.protocolSection.sponsorCollaboratorsModule.leadSponsor.name,
                            date: s.protocolSection.statusModule.startDateStruct?.date || 'N/A'
                        }));
                        self.postMessage({ type: 'DATA', data: processed });
                    } catch (err) { self.postMessage({ type: 'ERROR' }); }
                }
            }
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            worker.postMessage({ type: 'FETCH' });
            
            worker.onmessage = (e) => {
                if (e.data.type === 'DATA') {
                    allTrials = e.data.data;
                    filteredTrials = [...allTrials];
                    populateFilters();
                    renderDashboard();
                }
            };

            // Event Listeners
            document.getElementById('keywordSearch').addEventListener('input', debounce(() => {
                applyFilters();
            }, CONFIG.DEBOUNCE_MS));

            document.getElementById('loadMore').onclick = () => renderTable(true);
        });

        function applyFilters() {
            const term = document.getElementById('keywordSearch').value.toLowerCase();
            filteredTrials = allTrials.filter(t => 
                t.title.toLowerCase().includes(term) || 
                t.nct.toLowerCase().includes(term) ||
                t.sponsor.toLowerCase().includes(term)
            );
            displayedCount = 0;
            renderDashboard();
        }

        function renderDashboard() {
            updateKPIs();
            updateCharts();
            renderTable(false);
        }

        function renderTable(append = false) {
            const tbody = document.getElementById('trialsTableBody');
            if (!append) tbody.innerHTML = '';
            
            const nextBatch = filteredTrials.slice(displayedCount, displayedCount + CONFIG.CHUNK_SIZE);
            
            const fragment = document.createDocumentFragment();
            nextBatch.forEach(t => {
                const tr = document.createElement('tr');
                tr.className = 'border-b border-slate-700/50 hover:bg-slate-700/30 transition-colors';
                tr.innerHTML = `
                    <td class="p-3 max-w-[180px]">
                        <div class="text-blue-400 font-bold mb-1">${t.nct}</div>
                        <div class="truncate text-slate-400">${t.title}</div>
                    </td>
                    <td class="p-3 text-center">
                        <span class="px-2 py-1 rounded-full text-[9px] font-bold ${getStatusClass(t.status)}">
                            ${t.status.replace(/_/g, ' ')}
                        </span>
                    </td>
                    <td class="p-3 text-right text-slate-500 mobile-hide">${t.date}</td>
                `;
                fragment.appendChild(tr);
            });
            
            tbody.appendChild(fragment);
            displayedCount += nextBatch.length;
            document.getElementById('recordCount').innerText = `Showing ${displayedCount} of ${filteredTrials.length}`;
            
            // Hide load more if done
            document.getElementById('loadMore').style.display = displayedCount >= filteredTrials.length ? 'none' : 'block';
        }

        function getStatusClass(status) {
            if (status.includes('RECRUITING')) return 'bg-green-500/10 text-green-500';
            if (status.includes('COMPLETED')) return 'bg-blue-500/10 text-blue-500';
            return 'bg-slate-700 text-slate-400';
        }

        function initCharts() {
            const ctx1 = document.getElementById('phaseChart').getContext('2d');
            charts.phase = new Chart(ctx1, {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#6366f1', '#94a3b8'] }] },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, color: '#94a3b8', font: { size: 10 } } } } }
            });

            const ctx2 = document.getElementById('sponsorChart').getContext('2d');
            charts.sponsor = new Chart(ctx2, {
                type: 'bar',
                data: { labels: [], datasets: [{ data: [], backgroundColor: '#3b82f6' }] },
                options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { 
                    x: { display: false }, 
                    y: { ticks: { color: '#94a3b8', font: { size: 10 } } } 
                } }
            });
        }

        function updateCharts() {
            // Efficiency: Aggregation logic here
            const phases = filteredTrials.reduce((acc, t) => { acc[t.phase] = (acc[t.phase] || 0) + 1; return acc; }, {});
            charts.phase.data.labels = Object.keys(phases);
            charts.phase.data.datasets[0].data = Object.values(phases);
            charts.phase.update('none'); // Update without animation for performance
        }

        function updateKPIs() {
            document.getElementById('totalTrials').innerText = filteredTrials.length.toLocaleString();
            const rec = filteredTrials.filter(t => t.status === 'RECRUITING').length;
            document.getElementById('recruitingTrials').innerText = rec.toLocaleString();
            document.getElementById('totalParticipants').innerText = 'Data Sync';
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        function populateFilters() {
            const sFilter = document.getElementById('statusFilter');
            const pFilter = document.getElementById('phaseFilter');
            const statuses = [...new Set(allTrials.map(t => t.status))];
            const phases = [...new Set(allTrials.map(t => t.phase))];
            
            sFilter.innerHTML = '<option value="">All Statuses</option>' + statuses.map(s => `<option value="${s}">${s}</option>`).join('');
            pFilter.innerHTML = '<option value="">All Phases</option>' + phases.map(p => `<option value="${p}">${p}</option>`).join('');
        }
    </script>
</body>
</html>
